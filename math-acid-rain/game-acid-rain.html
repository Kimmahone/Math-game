<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신나는 수학 놀이터</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="acid-style.css">
</head>
<body class="h-full overflow-hidden">
    <div id="app" class="h-full w-full bg-gradient-to-b from-blue-900 via-cyan-800 to-blue-950 relative flex flex-col">
        
        <div id="screen-start" class="h-full w-full flex flex-col items-center justify-center p-4 relative z-20">
            <button onclick="goToLobby()" class="absolute top-6 left-6 flex items-center gap-2 text-white/80 hover:text-white hover:scale-105 transition-all text-xl font-bold cursor-pointer bg-white/10 px-4 py-2 rounded-full">
                🏠 로비로 돌아가기
            </button>
            
            <div class="text-6xl mb-4">🌧️</div>
            <h1 class="text-4xl font-bold text-yellow-300 mb-2 text-center">수학 산성비</h1>
            <p class="text-white text-lg mb-8 text-center">[5학년 1단원] 자연수의 혼합 계산</p>
            
            <div class="bg-white/10 backdrop-blur-sm rounded-3xl p-8 mb-8 max-w-md w-full">
                <p class="text-white text-center mb-6">난이도를 선택하세요:</p>
                <div class="space-y-3">
                    <button onclick="selectDifficulty('verySlow')" class="w-full px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-lg hover:from-green-600 hover:to-emerald-700 transition-all shadow-lg font-bold"> 🐢 매우 느림 </button> 
                    <button onclick="selectDifficulty('slow')" class="w-full px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-lg hover:from-cyan-600 hover:to-blue-700 transition-all shadow-lg font-bold"> 🚶 느림 </button> 
                    <button onclick="selectDifficulty('normal')" class="w-full px-6 py-3 bg-gradient-to-r from-yellow-500 to-orange-500 text-white rounded-lg hover:from-yellow-600 hover:to-orange-600 transition-all shadow-lg font-bold"> 🏃 보통 </button> 
                    <button onclick="selectDifficulty('fast')" class="w-full px-6 py-3 bg-gradient-to-r from-orange-500 to-red-600 text-white rounded-lg hover:from-orange-600 hover:to-red-700 transition-all shadow-lg font-bold"> 💨 빠름 </button> 
                    <button onclick="selectDifficulty('veryFast')" class="w-full px-6 py-3 bg-gradient-to-r from-red-500 to-pink-600 text-white rounded-lg hover:from-red-600 hover:to-pink-700 transition-all shadow-lg font-bold"> ⚡ 매우 빠름 </button>
                </div>
            </div>
        </div>

        <div id="screen-pause" class="hidden h-full w-full flex items-center justify-center p-4 relative z-50 bg-black/60 backdrop-blur-sm absolute inset-0">
            <div class="bg-blue-950 border-4 border-cyan-400 rounded-3xl p-8 text-center max-w-sm w-full">
                <div class="text-5xl mb-4">⏸</div>
                <h2 class="text-4xl font-bold text-cyan-300 mb-6">일시정지</h2>
                <div class="space-y-4">
                    <button onclick="resumeGame()" class="w-full px-6 py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white text-lg rounded-lg font-bold">▶ 계속하기</button> 
                    <button onclick="goToLobbyConfirm()" class="w-full px-6 py-4 bg-gradient-to-r from-red-500 to-pink-600 text-white text-lg rounded-lg font-bold">🏠 로비로 나가기</button>
                </div>
            </div>
        </div>

        <div id="screen-game" class="hidden h-full w-full flex flex-col p-4 relative z-20">
            <div class="flex justify-between items-center mb-4 bg-white/10 backdrop-blur-sm rounded-2xl p-4">
                <div class="text-center">
                    <div class="text-sm text-gray-300">점수</div>
                    <div id="score" class="text-3xl font-bold text-yellow-300">0</div>
                </div>
                <div class="text-center">
                    <div class="text-sm text-gray-300">콤보</div>
                    <div id="combo" class="text-3xl font-bold text-orange-400">0</div>
                </div>
                <div class="text-center">
                    <div class="text-sm text-gray-300">생명</div>
                    <div id="lives" class="text-3xl font-bold text-red-400">❤️❤️❤️❤️❤️</div>
                </div>
                <div class="text-center">
                    <div class="text-sm text-gray-300">시간</div>
                    <div id="timer" class="text-3xl font-bold text-cyan-300">0</div>
                </div>
            </div>

            <div class="flex gap-3 mb-4 justify-center">
                <button onclick="pauseGame()" id="pause-btn" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold">⏸ 일시정지</button> 
                <button onclick="giveUpGame()" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold">🏳️ 포기하고 결과보기</button>
            </div>

            <div id="game-area" class="flex-1 relative bg-blue-900/30 rounded-2xl overflow-hidden border-2 border-cyan-400/30">
                <div id="problems-container" class="absolute inset-0"></div>
                <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-blue-950/80 to-transparent p-4 z-10 flex justify-center">
                    <input id="answer-input" type="number" placeholder="답을 입력하고 Enter" class="w-full max-w-lg px-4 py-3 text-2xl rounded-lg text-center font-bold text-gray-900 bg-white/70 backdrop-blur-md border-4 border-transparent focus:outline-none focus:border-yellow-400 focus:bg-white shadow-lg" autocomplete="off">
                </div>
            </div>
        </div>

        <div id="screen-result" class="hidden h-full w-full flex flex-col items-center justify-center p-4 relative z-20">
            
            <div id="certificate-content" class="rounded-3xl p-10 max-w-md w-full border-4 border-yellow-400 shadow-2xl relative text-center">
                <div class="text-6xl mb-4">🎊</div>
                <h2 class="text-4xl font-bold text-yellow-300 mb-2">도전 완료!</h2>
                <p class="text-xl text-white mb-6">자랑스러운 <strong id="result-player-name" class="text-cyan-300 text-2xl"></strong>의 기록</p>
                
                <div class="space-y-6 text-left">
                    <div class="border-b border-white/20 pb-4">
                        <div class="text-sm text-gray-300 mb-1">선택 난이도</div>
                        <div id="result-difficulty" class="text-2xl font-bold text-cyan-300">보통</div>
                    </div>
                    <div class="border-b border-white/20 pb-4">
                        <div class="text-sm text-gray-300 mb-1">총 생존 시간</div>
                        <div id="result-time" class="text-2xl font-bold text-cyan-300">0초</div>
                    </div>
                    <div class="border-b border-white/20 pb-4">
                        <div class="text-sm text-gray-300 mb-1">최고 콤보</div>
                        <div id="result-max-combo" class="text-2xl font-bold text-orange-400">0</div>
                    </div>
                    <div class="bg-gradient-to-r from-yellow-400 to-yellow-300 rounded-xl p-4 text-center">
                        <div class="text-sm text-gray-800 mb-1">최종 획득 점수</div>
                        <div id="result-score" class="text-5xl font-black text-gray-900">0</div>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex flex-col gap-3 w-full max-w-md">
                <button onclick="downloadResult()" class="w-full px-6 py-4 bg-gradient-to-r from-blue-500 to-cyan-500 text-white text-lg rounded-lg hover:from-blue-600 hover:to-cyan-600 shadow-lg font-bold"> 🖼️ 멋진 결과 이미지로 저장하기 </button>
                <div class="flex gap-3">
                    <button onclick="resetGame()" class="flex-1 px-4 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white text-lg rounded-lg font-bold"> 🔄 다시 하기 </button>
                    <button onclick="goToLobby()" class="flex-1 px-4 py-3 bg-gradient-to-r from-gray-600 to-gray-700 text-white text-lg rounded-lg font-bold"> 🏠 로비로 </button>
                </div>
            </div>
        </div>
    </div>

    <script src="acid-script.js"></script>
</body>
</html>
