<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신나는 수학 놀이터</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 신나는 수학 놀이터 ✨</h1>
            <p>우리 반만의 특별한 수학 모험을 선택해 봐!</p>
            
            <div class="global-name-input">
                <input type="text" id="studentName" placeholder="너의 이름을 먼저 적어주렴" autocomplete="off">
                <p id="nameNotice" class="name-notice">이름을 입력해야 게임을 시작할 수 있어!</p>
            </div>
        </header>

        <div class="game-grid">
            <div class="game-card">
                <div class="card-header">
                    <h2>[1단원] 수학 산성비</h2>
                    <span class="badge badge-blue">아케이드</span>
                </div>
                <p class="unit-title">자연수의 혼합 계산</p>
                <p class="desc">하늘에서 떨어지는 혼합 계산 문제를 빠르게 풀어서 최고 기록을 세워보자! 점수에 따라 날씨가 변할지도 몰라.</p>
                
                <div class="input-group">
                    <button class="play-btn acid-btn" onclick="startAcidRain()">🌧️ 산성비 마을 입장</button>
                </div>
            </div>

            <div class="game-card active">
                <div class="card-header">
                    <h2>[3단원] 마법사의 비밀 방</h2>
                    <span class="badge badge-purple">방탈출 (RPG)</span>
                </div>
                <p class="unit-title">규칙과 대응</p>
                <p class="desc">마법사의 서재에 숨겨진 대응 관계를 찾아 단서를 모으자. 마지막에 선생님의 비밀 편지가 기다리고 있어!</p>
                
                <div class="input-group">
                    <p class="select-title">내 캐릭터 고르기 (해병대 반티)</p>
                    <div class="char-selector">
                        <div class="char-option selected" id="opt-boy" onclick="selectChar('boy')">
                            <img src="Escape-room/image/char_boy.png" alt="남학생">
                            <span>남학생</span>
                        </div>
                        <div class="char-option" id="opt-girl" onclick="selectChar('girl')">
                            <img src="Escape-room/image/char_girl.png" alt="여학생">
                            <span>여학생</span>
                        </div>
                    </div>

                    <button class="play-btn escape-btn" onclick="startGame()">🧙‍♂️ 마법 학교 입장</button>
                </div>
            </div>
        </div>
        <p id="errorMessage" class="error-msg"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
